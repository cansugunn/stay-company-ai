spring.application.name=stay-company-ai
server.servlet.context-path=/ai
server.port=8081

spring.ai.mcp.client.streamable-http.connections.stay-company-mcp-server.url=http://localhost:8082


jwt.key=${JWT_KEY}


spring.ai.ollama.base-url=http://localhost:11434
spring.ai.model.chat=ollama
